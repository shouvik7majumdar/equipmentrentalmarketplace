name: Deploy Frontend

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Next.js Web Application
        run: npm run build
        env:
          NEXT_PUBLIC_CONTRACT_ID: "CCWU6TT5NKH43SW72I6XISHBBGL4H7UX74QCMJIACE6SVJW6K27NGNNY"
          NEXT_PUBLIC_REVIEW_REGISTRY_ID: "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"
          NEXT_PUBLIC_TOKEN_ADDRESS: "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"
          NEXT_PUBLIC_NETWORK: "testnet"
          NEXT_PUBLIC_RPC_URL: "https://soroban-testnet.stellar.org"
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"

      - name: Validate Production Build
        run: |
          echo "Production build validation successful. Ready for deployment."
