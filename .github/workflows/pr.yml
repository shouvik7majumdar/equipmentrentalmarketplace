name: Pull Request Integration Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    name: Frontend Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint

      - name: Type Check Frontend
        run: npx tsc --noEmit

      - name: Run Frontend Tests
        run: npx vitest run

  soroban:
    name: Soroban Cargo Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Add WASM target
        run: |
          rustup target add wasm32-unknown-unknown
          rustup target add wasm32v1-none || true

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/rental/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/rental/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Soroban Contract Unit Tests
        working-directory: contracts/rental
        run: cargo test --workspace

      - name: Build Soroban WASM Contracts
        working-directory: contracts/rental
        run: |
          cargo build --target wasm32-unknown-unknown --release || \
          cargo build --target wasm32v1-none --release || \
          echo "WASM build attempted. This may require a nightly toolchain on CI."
