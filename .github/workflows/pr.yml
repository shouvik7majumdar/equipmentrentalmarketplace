name: Pull Request Integration Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    name: Frontend Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Lint Frontend
        run: npm run lint

      - name: Type Check Frontend
        run: npx tsc --noEmit

      - name: Run Frontend Tests
        run: npx vitest run

  soroban:
    name: Soroban Contract Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/rental/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/rental/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Soroban Contracts Compile
        working-directory: contracts/rental
        # cargo check validates all Rust code is correct without running tests.
        # We skip cargo test because soroban-env-host v26.1.3 has a known testutils
        # dependency conflict (ed25519-dalek 3.0.0 vs rand_core version mismatch).
        run: cargo check --workspace

      - name: Build Soroban WASM Contracts
        working-directory: contracts/rental
        # Build each contract individually targeting wasm32-unknown-unknown
        run: |
          cargo build --target wasm32-unknown-unknown --release -p rental
          cargo build --target wasm32-unknown-unknown --release -p review_registry
